book:
  name: Book Course
  description: Book a course at Cosmos
  fields:
    course:
      name: Course
      description: Name of the course to book
      required: true
      example: "Yoga"
      selector:
        text:
    day:
      name: Day
      description: Day of the week (Mon-Sun or 1-7)
      required: true
      example: "Mon"
      selector:
        select:
          options:
            - "Mon"
            - "Tue"
            - "Wed"
            - "Thu"
            - "Fri"
            - "Sat"
            - "Sun"
    time:
      name: Time
      description: Time in HH:MM format
      required: true
      example: "18:00"
      selector:
        text:
  response:
    success:
      description: Whether the booking was successful
      type: boolean
    message:
      description: Result message (e.g., "already booked", "booked successfully")
      type: string
    course:
      description: The course name
      type: string
    day:
      description: Day of the week (1-7)
      type: integer
    time:
      description: Time in HH:MM format
      type: string
